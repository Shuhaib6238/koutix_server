version: '3.8'

services:
  koutix_server:
    build:
      context: ./koutix_server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongodb:27017/koutix
      # Add other env vars here or use an env_file
    env_file:
      - ./koutix_server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  koutix_web:
    build:
      context: ./koutix_web
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./koutix_web/src:/app/src
      - ./koutix_web/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:3001/api # Adjust base URL for Docker

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - koutix_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - koutix_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  koutix_mongo_data:
  koutix_redis_data:
